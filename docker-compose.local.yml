# docker-compose.local.yml — para desarrollo/testing local con Docker
#
# Uso:
#   docker compose -f docker-compose.local.yml up --build

services:
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    init: true
    environment:
      - TOKEN_TTL=6
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BGUTIL_URL=http://bgutil-provider:4416
    depends_on:
      - bgutil-provider
    restart: unless-stopped
